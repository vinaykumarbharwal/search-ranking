<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankSmart Enterprise Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --accent-solid: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-subtle: #334155;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .header h1 {
            font-size: 3.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        
        .header p {
            font-size: 1.1em;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        
        .search-wrapper {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .search-wrapper:focus-within {
            border-color: var(--accent-solid);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        
        .search-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        
        .search-input {
            width: 100%;
            padding: 20px 20px 20px 55px;
            font-size: 1.25em;
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
        }

        .search-input::placeholder {
            color: #475569;
        }
        
        .search-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.9em;
        }

        select {
            background: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
            padding: 8px 16px;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--accent-solid);
        }
        
        .search-button {
            background: var(--accent-solid);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        
        .search-button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 25px var(--accent-glow);
        }
        
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .result-item {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
            backdrop-filter: blur(8px);
        }
        
        .result-item:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: #475569;
            transform: translateX(5px);
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 1.15em;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.5;
            flex-grow: 1;
            padding-right: 20px;
        }
        
        .score-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 100px;
        }

        .match-percentage {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--success);
        }

        .match-label {
            font-size: 0.75em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--success);
            border-radius: 2px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .metrics-banner {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0) 100%);
            border-left: 3px solid var(--accent-solid);
            border-radius: 8px;
            animation: fadeIn 0.5s ease-out;
        }
        
        .metric-block {
            display: flex;
            flex-direction: column;
        }
        
        .metric-value {
            font-size: 1.4em;
            font-weight: 600;
            color: var(--text-main);
        }
        
        .metric-label {
            font-size: 0.8em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner {
            border: 3px solid var(--border-subtle);
            border-top: 3px solid var(--accent-solid);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(30, 41, 59, 0.4);
            border: 1px dashed var(--border-subtle);
            border-radius: 16px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RankSmart</h1>
            <p>Enterprise Vector & Semantic Native Search</p>
        </div>
        
        <div class="search-wrapper">
            <div class="search-input-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Enter query to deep-search your documents..." autocomplete="off">
            </div>
            <div class="search-controls">
                <div class="filter-group">
                    <label for="topK">Fetch top</label>
                    <select id="topK">
                        <option value="5">5 results</option>
                        <option value="10" selected>10 results</option>
                        <option value="20">20 results</option>
                    </select>
                </div>
                <button class="search-button" onclick="performSearch()">Initialize Search</button>
            </div>
        </div>
        
        <div id="resultsArea"></div>
    </div>
    
    <script>
        const API_URL = window.location.origin;
        
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const topK = document.getElementById('topK').value;
            const resultsArea = document.getElementById('resultsArea');
            
            if (!query) return;
            
            resultsArea.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px; font-weight: 500;">Computing semantic vectors...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`${API_URL}/search?query=${encodeURIComponent(query)}&top_k=${topK}`);
                const data = await response.json();
                
                displayResults(data);
            } catch (error) {
                resultsArea.innerHTML = `
                    <div class="empty-state" style="border-color: #ef4444; color: #ef4444;">
                        <h3>Connection Fault</h3>
                        <p style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;">
                            Cannot reach backend. Ensure you are running:<br>
                            <code>uvicorn api.advanced_api:app --reload --port 8001</code>
                        </p>
                    </div>
                `;
            }
        }
        
        function displayResults(data) {
            const resultsArea = document.getElementById('resultsArea');

            if (!data.results || data.results.length === 0) {
                resultsArea.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3em; margin-bottom: 15px;">🏜️</div>
                        <h3>No semantic matches found</h3>
                        <p style="margin-top: 8px;">We couldn't connect "${escapeHtml(data.query)}" to any documents. Try different keywords.</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="metrics-banner">
                    <div class="metric-block">
                        <div class="metric-value">${data.total_results}</div>
                        <div class="metric-label">Documents Retrieved</div>
                    </div>
                    <div class="metric-block">
                        <div class="metric-value">${data.response_time_ms} ms</div>
                        <div class="metric-label">Query Time</div>
                    </div>
                    <div class="metric-block" style="margin-left: auto; text-align: right;">
                        <div class="metric-value" style="color: var(--accent-solid); font-size: 1.1em; margin-top: auto;">
                            ${data.features || 'Hybrid FAISS/BM25 Configured'}
                        </div>
                    </div>
                </div>
                <div class="results-container">
            `;
            
            // Determine dynamic upper bound from the uncalibrated ML margin
            const scores = data.results.map(r => r.score);
            const maxScore = scores.length > 0 ? Math.max(...scores) : 1;

            data.results.forEach((result, index) => {
                // Determine relative distance within this specific query's results
                let relativeRatio = maxScore > 0 ? (result.score / maxScore) : 0;
                
                // Establish an Absolute ceiling based on the pure mathematical magnitude. 
                // A great query has a high absolute score (ceiling hits 98%). A terrible noise query ceiling is crushed to 15-20%.
                let ceiling = Math.min((maxScore * 130), 98);
                ceiling = Math.max(ceiling, 10);
                
                // Final calculation accurately penalizes poor results
                let scorePercent = relativeRatio * ceiling;
                scorePercent = Math.min(Math.max(scorePercent, 5), 100);
                
                let barColor = 'var(--success)';
                if (scorePercent < 65) barColor = '#f59e0b';
                if (scorePercent < 35) barColor = '#ef4444';

                html += `
                    <div class="result-item" style="animation-delay: ${index * 0.08}s">
                        <div class="result-header">
                            <div class="result-title">
                                ${escapeHtml(result.document)}
                            </div>
                            <div class="score-badge">
                                <div class="match-percentage" style="color: ${barColor}">${Math.round(scorePercent)}%</div>
                                <div class="match-label">Relevance</div>
                            </div>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${scorePercent}%; background: ${barColor}"></div>
                        </div>
                    </div>
                `;
            });
            
            html += `</div>`;
            resultsArea.innerHTML = html;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
