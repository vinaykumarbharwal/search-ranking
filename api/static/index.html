<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Ranking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            align-items: center;
        }
        
        .search-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .search-button:hover {
            transform: translateY(-2px);
        }
        
        .results-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .result-item {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }
        
        .result-item:hover {
            background: #f8f9fa;
        }
        
        .result-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-score {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .metrics {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .metric {
            flex: 1;
            text-align: center;
        }
        
        .metric-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .metric-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 AI Search Ranking System</h1>
            <p>Powered by LambdaMART Learning-to-Rank</p>
        </div>
        
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" 
                   placeholder="Search for documents... (e.g., 'python programming')">
            <div class="search-controls">
                <label>
                    Results:
                    <select id="topK">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                    </select>
                </label>
                <button class="search-button" onclick="performSearch()">Search</button>
            </div>
        </div>
        
        <div class="results-container">
            <div id="results"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const topK = document.getElementById('topK').value;
            
            if (!query) {
                alert('Please enter a search query');
                return;
            }
            
            // Show loading
            document.getElementById('results').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px;">Searching...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`${API_URL}/search?query=${encodeURIComponent(query)}&top_k=${topK}`);
                const data = await response.json();
                
                displayResults(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = `
                    <div class="loading" style="color: red;">
                        ❌ Error: ${error.message}<br>
                        Make sure the backend server is running: uvicorn api.main:app --reload
                    </div>
                `;
            }
        }
        
        function displayResults(data) {
            if (!data.results || data.results.length === 0) {
                document.getElementById('results').innerHTML = `
                    <div class="loading">
                        😕 No results found for "${data.query}"
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value">${data.total_results}</div>
                        <div class="metric-label">Results</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">${data.response_time_ms}ms</div>
                        <div class="metric-label">Response Time</div>
                    </div>
                </div>
                <h3>Results for: "${data.query}"</h3>
            `;
            
            data.results.forEach((result, index) => {
                html += `
                    <div class="result-item">
                        <div class="result-title">
                            ${index + 1}. ${escapeHtml(result.document)}
                        </div>
                        <div class="result-score">
                            Relevance Score: ${result.score.toFixed(4)}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('results').innerHTML = html;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
